          for (let cabY = y; cabY < y + h - 1; cabY += half) {
            const ch = Math.min(half, y + h - cabY);
            px(sx, cabY, w, ch, A.cabFrame);
            px(sx + 4, cabY + 4, w - 8, ch - 8, A.cabCloth);                        // speaker cloth
            for (let gx = 0; gx < 3; gx += 1) for (let gy = 0; gy < 2; gy += 1) {
              px(sx + 12 + gx * (w - 24) / 2, cabY + 8 + gy * (ch - 16), 3, 3, A.cabDot);
            }
          }
        } else if (obstacle.type === 'bench') {
          px(sx, y, w, Math.max(8, h * 0.36), A.benchTop);                          // plank
          px(sx + 5, y + h * 0.4, 8, h * 0.6, A.benchLeg);                          // legs
          px(sx + w - 13, y + h * 0.4, 8, h * 0.6, A.benchLeg);
          px(sx + w * 0.35, y + 2, w * 0.28, Math.max(6, h * 0.3), A.benchMetal);   // chassis
          for (let i = 0; i < 3; i += 1) px(sx + w * 0.4 + i * 10, y + 3, 4, 3, i === 1 ? A.benchTool : A.benchDark);
        } else if (obstacle.type === 'crate') {
          px(sx, y, w, h, A.crateBody);
          px(sx, y + h * 0.34, w, 3, A.crateSlat);
          px(sx, y + h * 0.7, w, 3, A.crateSlat);
          const recs = [A.crateRecA, A.crateRecB, A.crateRecC, A.crateRecD];        // records poking out
          for (let i = 0; i < 4; i += 1) {
            px(sx + 6 + i * 11, y - 10, 5, 12, CONFIG.dark);
            px(sx + 6 + i * 11, y - 10, 5, 3, recs[i % recs.length]);
          }
        } else if (obstacle.type === 'mic') {
          px(sx + w / 2 - 2, y + 14, 4, h - 14, A.micPole);                          // pole
          px(sx + w / 2 - 7, y, 14, 16, A.micHead);                                  // mic head
          for (let gx = 0; gx < 2; gx += 1) for (let gy = 0; gy < 2; gy += 1) px(sx + w / 2 - 4 + gx * 4, y + 3 + gy * 4, 2, 2, A.micGrille);
          px(sx + w / 2 - 10, y + h - 4, 20, 4, A.micPole);                          // base
        } else {
          px(sx, y, w, h, obstacle.color);
        }
      }
    }

    function drawEnemies() {
      const A = CONFIG.art;
      for (const enemy of enemies) {
        const sx = enemy.worldX - player.cameraX;
        const sy = enemy.worldY;
        const w = enemy.width;
        const h = enemy.height;

        if (enemy.type === 'roomba') {
          const frame = Math.floor(state.time * 6) % 2;              // blink + move
          if (frame === 0) { px(sx - 8, sy + 4, 6, 2, A.roombaDash); px(sx - 8, sy + 9, 8, 2, A.roombaDash); } // motion dashes
          px(sx, sy + 4, w, h - 4, A.roomba);                        // disc body
          px(sx + w * 0.32, sy, w * 0.36, 6, A.roombaDome);          // dome
          px(sx + w * 0.42, sy + 7, 4, 4, frame ? A.roombaEyeB : A.roombaEyeA); // blinking sensor
          px(sx + w - 12, sy + 7, 3, 3, CONFIG.bluBody);
          px(sx + w - 7, sy + 7, 3, 3, CONFIG.bluBody);
          px(sx + 6, sy + h - 4, 8, 4, A.roombaWheel);
          px(sx + w - 14, sy + h - 4, 8, 4, A.roombaWheel);
        } else if (enemy.type === 'rat') {
          const frame = Math.floor(state.time * 12) % 2;             // scurry
          px(sx, sy + 6, 14, 3, A.ratTail);                          // tail (whips back)
          px(sx + 12, sy + 4, 18, h - 4, A.rat);                     // body
          px(sx + w - 12, sy + 6, 12, 10, A.rat);                    // head (front-right)
          px(sx + w - 10, sy + 1, 5, 5, A.rat);                      // ear
          px(sx + w - 3, sy + 10, 2, 2, A.ratNose);                  // pink nose
          px(sx + w - 7, sy + 8, 3, 3, CONFIG.bluNose);              // eye
          if (frame === 0) { px(sx + 14, sy + h - 2, 4, 4, A.ratFoot); px(sx + 24, sy + h - 2, 4, 4, A.ratFoot); }
          else { px(sx + 18, sy + h - 2, 4, 4, A.ratFoot); px(sx + 28, sy + h - 2, 4, 4, A.ratFoot); }
        } else if (enemy.type === 'drone') {
          const blur = Math.floor(state.time * 20) % 2;              // prop blur frames
          if (blur === 0) { px(sx, sy, 18, 3, A.droneProp); px(sx + w - 18, sy, 18, 3, A.droneProp); }
          else { for (let i = 0; i < 3; i += 1) { px(sx + i * 7, sy, 5, 3, A.droneProp); px(sx + w - 19 + i * 7, sy, 5, 3, A.droneProp); } }
          px(sx + 8, sy + 3, 3, 5, A.droneStalk);                    // rotor stalks
          px(sx + w - 11, sy + 3, 3, 5, A.droneStalk);
          px(sx + w * 0.28, sy + 8, w * 0.44, 12, A.drone);          // body
          px(sx + w / 2 - 2, sy + 12, 4, 4, blur ? A.droneEyeB : A.droneEyeA); // sensor
          px(sx + w * 0.32, sy + h - 3, 8, 3, A.droneRotor);
          px(sx + w * 0.58, sy + h - 3, 8, 3, A.droneRotor);
        }
      }
    }

    function drawPickups() {
      const A = CONFIG.art;
      for (const p of pickups) {
        const sx = p.worldX - player.cameraX;
        const y = p.worldY + Math.sin(p.bob) * 4;
        if (p.kind === 'note') {
          // chunky note: head + stem + flag (bobbing)
          px(sx, y + 10, 12, 9, A.noteDark);
          px(sx + 12, y, 3, 12, A.noteDark);
          px(sx + 15, y, 9, 6, A.noteDark);
        } else if (p.kind === 'vinyl') {
          const cx = sx + p.width / 2;
          const cy = y + p.height / 2;
          const r = p.width / 2;
          // round-ish disc from stacked rects (no outline)
          px(cx - r + 4, cy - r, 2 * r - 8, 2 * r, A.vinylDisc);
          px(cx - r, cy - r + 4, 2 * r, 2 * r - 8, A.vinylDisc);
          px(cx - 4, cy - 4, 8, 8, A.vinylLabel);                 // label
          const f = Math.floor(p.spin / (Math.PI / 2)) % 3;        // 3-frame shine sweep
          if (f === 0) px(cx - 4, cy - 4, 8, 2, A.vinylShine);
          else if (f === 1) px(cx - 1, cy - 4, 2, 8, A.vinylShine);
          else px(cx + 1, cy - 3, 2, 6, A.vinylShine);
          px(cx - r + 2, cy + r - 6, 4, 4, A.vinylGroove);
        } else if (p.kind === 'shield') {
          // pulsing blue glow behind the headphones
          const pulse = 0.14 + 0.1 * (Math.sin(p.bob) * 0.5 + 0.5);
          ctx.fillStyle = `rgba(74,144,217,${pulse})`;
          ctx.beginPath();
          ctx.arc(sx + p.width / 2, y + p.height / 2, 16, 0, Math.PI * 2);
          ctx.fill();
          drawHeadphones(sx + p.width / 2, y + p.height / 2 + 2, 1, false);
          if (Math.floor(p.bob * 2) % 2 === 0) {                   // glow-pulse sparkle bits
            px(sx - 2, y, 3, 3, A.shieldAccent);
            px(sx + p.width, y, 3, 3, A.shieldAccent);
          }
        }
      }
    }

    // Pixel headphones (orange band, dark cups, blue accents) — shield pickup,
    // worn Blu, and the HUD slot. `dim` greys it out for the empty HUD slot.
    function drawHeadphones(cx, cy, scale, dim) {
      const A = CONFIG.art;
      const band = dim ? '#6a635a' : A.shieldBand;
      const cup = dim ? '#4a463f' : A.shieldCup;
      const accent = dim ? '#6a635a' : A.shieldAccent;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      px(-12, -12, 24, 4, band);        // headband
      px(-16, -8, 4, 10, band);
      px(12, -8, 4, 10, band);
      px(-14, 2, 10, 12, cup);          // ear cups
      px(4, 2, 10, 12, cup);
      px(-16, 0, 2, 10, accent);        // blue accents
      px(14, 0, 2, 10, accent);
      ctx.restore();
    }

    // Speaker icon (top-right) — shows a slash / sound waves per mute state.
    function drawMuteIcon(cx, cy) {
      ctx.save();
      ctx.translate(cx, cy);
      const c = '#5c4a33';
      px(-6, -4, 6, 8, c);              // speaker box
      px(0, -8, 6, 16, c);              // cone
      if (state.muted) {
        ctx.strokeStyle = CONFIG.rust; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-8, -8); ctx.lineTo(12, 10); ctx.stroke();  // slash
      } else {
        px(9, -3, 2, 6, c); px(13, -6, 2, 12, c);                               // sound waves
      }
      ctx.restore();
    }

    function drawDizzyStars(cx, cy) {
      ctx.save();
      ctx.fillStyle = CONFIG.groundGlow;
      for (const s of state.stars) {
        const sx = cx + Math.cos(s.angle) * s.radius;
        const sy = cy + Math.sin(s.angle) * s.radius * 0.5;
        // tiny 4-point pixel star
        ctx.fillRect(sx - 1, sy - 3, 2, 6);
        ctx.fillRect(sx - 3, sy - 1, 6, 2);
      }
      ctx.restore();
    }

    function drawBluTumble() {
      const B = CONFIG.bluBody, E = CONFIG.bluEar, N = CONFIG.bluNose;
      ctx.save();
      ctx.translate(player.x, player.y - 16);
      ctx.rotate(player.angle);
      // Curled ball
      px(-16, -14, 32, 26, B);
      px(-14, -18, 11, 6, B); px(-1, -18, 12, 6, B);
      px(-13, -21, 5, 6, E); px(5, -21, 5, 6, E);     // ears
      px(-16, 10, 10, 5, B); px(6, 10, 10, 5, B);     // tucked paws
      // Dizzy X eyes
      ctx.strokeStyle = N; ctx.lineWidth = 2;
      const X = (ex) => { ctx.beginPath(); ctx.moveTo(ex - 3, -6); ctx.lineTo(ex + 3, 0); ctx.moveTo(ex + 3, -6); ctx.lineTo(ex - 3, 0); ctx.stroke(); };
      X(-6); X(8);
      px(14, 2, 10, 4, B); px(22, 0, 6, 4, E);        // tail + orange tip
      ctx.restore();
      // Stars orbit the head, in screen space
      drawDizzyStars(player.x, player.y - 34);
    }

    function drawBlu() {
      if (player.dead && state.deathPhase !== 'freeze') {
        drawBluTumble();
        return;
      }
      const B = CONFIG.bluBody, E = CONFIG.bluEar, EY = CONFIG.bluEye, N = CONFIG.bluNose, SH = CONFIG.bluShade, MK = CONFIG.bluMask;
      const dir = player.facing;

      let pose;
      if (player.dashTimer > 0) pose = 'dash';
      else if (player.isSliding) pose = 'slide';
      else if (!player.onGround) {
        if (input.down && player.vy > 40) pose = 'dive';
        else if (player.vy < 0 && player.doubleJumpsLeft === 0) pose = 'tuck';
        else pose = 'air';
      } else pose = 'run';

      const bob = pose === 'run' ? Math.round(Math.sin(state.time * 14) * 1.5) : 0;
      let headX = 14, headY = -40;

      // Squash & stretch: compress on landing, stretch toward the jump apex.
      let sqX = 1, sqY = 1;
      if (player.landTimer > 0) {
        const k = player.landTimer / CONFIG.landSquashTime;
        sqX = 1 + 0.30 * k; sqY = 1 - 0.28 * k;
      } else if (!player.onGround) {
        const s = Math.max(-0.6, Math.min(0.6, -player.vy / 700));
        sqY = 1 + 0.16 * s; sqX = 1 - 0.10 * s;
      }
      // Wake-up startle pop on run start
      let wakeBob = 0;
      if (state.wakeTimer > 0) {
        const w = 1 - state.wakeTimer / CONFIG.wakeStartleTime;
        wakeBob = -Math.sin(w * Math.PI) * 7;
        sqY *= 1 + 0.15 * Math.sin(w * Math.PI);
      }
      // Ears/whole-body twitch when an enemy is near ahead
      let enemyNear = false;
      for (const en of enemies) {
        const esx = en.worldX - player.cameraX;
        if (esx > player.x - 10 && esx - player.x < CONFIG.enemyNearDist && Math.abs(en.worldY - player.y) < 120) { enemyNear = true; break; }
      }
      const twitch = enemyNear && player.onGround ? Math.round(Math.sin(state.time * 36)) : 0;

      ctx.save();
      ctx.translate(player.x + twitch, player.y + bob + wakeBob);
      ctx.scale(dir * sqX, sqY);

      if (pose === 'run') {
        px(-30, -26, 8, 4, B); px(-34, -30, 7, 4, B); px(-38, -33, 6, 4, E);   // tail
        px(-20, -26, 30, 14, B);                                               // torso
        px(4, -34, 20, 16, B);                                                 // head
        px(6, -40, 5, 7, E); px(16, -40, 5, 7, E);                             // ears
        px(7, -38, 3, 3, SH); px(17, -38, 3, 3, SH);
        px(14, -24, 10, 5, MK); px(16, -28, 4, 4, EY); px(22, -24, 2, 2, N);   // mask/eye/nose
        const cyc = state.time * 16 * (1 + Math.abs(player.vx) / 260);         // gallop
        const L = (lx, ph) => { const len = 10 + Math.sin(cyc + ph) * 4; px(lx, -12, 4, len, SH); px(lx, -14 + len, 5, 2, SH); };
        L(-16, 0); L(-6, Math.PI); L(2, Math.PI * 0.5); L(12, Math.PI * 1.5);
        headX = 14; headY = -40;
      } else if (pose === 'air') {
        px(-16, -34, 6, 4, B); px(-20, -38, 6, 4, E);                          // tail up
        px(-12, -40, 24, 26, B);                                              // stretched body
        px(-8, -50, 20, 16, B);                                              // head up
        px(-6, -56, 5, 7, E); px(6, -56, 5, 7, E);
        px(6, -46, 4, 4, EY); px(12, -42, 2, 2, N); px(-2, -40, 10, 5, MK);
        px(10, -26, 8, 5, SH);                                               // front paws reaching
        px(-10, -16, 5, 8, SH); px(0, -16, 5, 8, SH);                         // back legs tucked
        headX = 2; headY = -56;
      } else if (pose === 'tuck') {
        px(-15, -40, 30, 24, B);                                             // ball
        px(2, -44, 20, 14, B);
        px(4, -50, 5, 7, E); px(14, -50, 5, 7, E);
        px(14, -40, 4, 4, EY); px(20, -36, 2, 2, N);
        px(-10, -16, 6, 5, SH); px(6, -16, 6, 5, SH);                         // paws in
        px(-18, -30, 7, 4, E);                                               // curled tail tip
        headX = 8; headY = -50;
      } else if (pose === 'dive') {
        ctx.rotate(0.32);                                                     // nose-down tilt
        px(-20, -28, 8, 4, E);
        px(-14, -26, 28, 14, B);
        px(10, -22, 20, 14, B);
        px(12, -30, 5, 6, E); px(2, -28, 5, 6, E);                           // ears back
        px(22, -18, 4, 4, EY); px(28, -12, 2, 2, N);
        px(18, -10, 8, 5, SH);
        headX = 18; headY = -30;
      } else if (pose === 'slide') {
        px(-30, -12, 8, 2, SH); px(-30, -8, 10, 2, SH);                       // motion lines
        px(-22, -16, 40, 12, B);
        px(12, -18, 22, 14, B);
        px(4, -20, 5, 5, E); px(-4, -18, 5, 5, E);                           // ears back
        px(24, -14, 4, 4, EY); px(31, -10, 2, 2, N);
        px(28, -6, 10, 4, SH);                                               // front paws stretched
        headX = 18; headY = -20;
      } else if (pose === 'dash') {
        for (let i = 0; i < 4; i += 1) px(-32 - i * 6, -24 + i * 3, 8, 2, `rgba(232,160,106,${0.5 - i * 0.1})`);
        px(-26, -26, 48, 14, B);                                             // elongated body
        px(14, -28, 20, 15, B);
        px(16, -33, 5, 5, E); px(8, -31, 5, 5, E);                           // ears back
        px(26, -22, 4, 3, EY); px(32, -18, 2, 2, N);
        px(-26, -14, 6, 8, SH); px(-14, -14, 6, 8, SH);                       // trailing legs
        headX = 20; headY = -33;
      }

      // Worn headphone shield (flickers during the ~0.5s break window)
      const flickering = player.shieldBreakTimer > 0 && Math.floor(state.time * 20) % 2 === 0;
      if (player.hasShield || flickering) {
        drawHeadphones(headX, headY + 6, 0.7, false);
      }

      ctx.restore();
    }

    function drawUI() {
      const width = canvas.clientWidth;
      ctx.save();
      ctx.textAlign = 'left';

      // Distance (big)
      ctx.fillStyle = '#5c4a33'; ctx.font = 'bold 26px monospace';
      ctx.fillText(`${Math.floor(player.meters)}m`, 20, 40);

      // Speed chevrons (more ▸ = faster)
      const spd = Math.min(5, Math.max(1, Math.floor((state.scrollSpeed - CONFIG.baseScrollSpeed) / 60) + 1));
      ctx.fillStyle = '#b8563e'; ctx.font = 'bold 13px monospace';
      ctx.fillText(`SPD ${'▸'.repeat(spd)}`, 20, 60);

      // Dash cooldown bar (refills; brighter orange when ready)
      px(20, 68, 90, 8, '#d6c5a2');
      const ready = player.dashCooldown <= 0;
      const fill = ready ? 1 : 1 - player.dashCooldown / CONFIG.dashCooldown;
      px(20, 68, 90 * fill, 8, ready ? '#f0b45c' : '#e8a06a');

      // Pickup points
      ctx.fillStyle = '#5c4a33'; ctx.font = 'bold 14px monospace';
      ctx.fillText(`PTS ${player.points}`, 20, 98);

      // Shield slot: gray headphones → lit (blue) when held
      drawHeadphones(40, 120, 0.9, !player.hasShield);

      // Mute speaker, top-right
      drawMuteIcon(width - 30, 30);
      ctx.restore();
    }

    function drawDebug() {
      if (!CONFIG.debug) return;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.save();
      ctx.font = '14px monospace';
      ctx.fillStyle = 'rgba(0,0,0,0.76)';
      ctx.fillRect(12, 96, 250, 162);
      ctx.fillStyle = '#fbf6ea';
      ctx.fillText(`vx ${player.vx.toFixed(1)} vy ${player.vy.toFixed(1)}`, 20, 118);
      ctx.fillText(`ground ${player.onGround ? 'Y' : 'N'} slide ${player.isSliding ? 'Y' : 'N'}`, 20, 138);
      ctx.fillText(`double ${player.doubleJumpsLeft > 0 ? 'Y' : 'N'}`, 20, 158);
      ctx.fillText(`speed ${state.scrollSpeed.toFixed(1)} m/s`, 20, 178);
      ctx.fillText(`stage ${state.stageIndex + 1}`, 20, 198);
      ctx.fillText(`dash ${player.dashCooldown > 0 ? 'CD' : 'OK'}`, 20, 218);
      ctx.fillText(`obs ${obstacles.length} ene ${enemies.length} pk ${pickups.length} ptcl ${countActiveParticles()}`, 20, 238);
      ctx.restore();

      // Hitboxes
      ctx.strokeStyle = 'rgba(255,80,80,0.8)';
      ctx.strokeRect(player.x - player.width / 2, player.y - player.height + 1, player.width, player.height * (player.isSliding ? CONFIG.slideHeight : 1));
      ctx.strokeStyle = 'rgba(80,120,255,0.8)';
      for (const obstacle of obstacles) {
        const screenX = obstacle.worldX - player.cameraX;
        ctx.strokeRect(screenX, canvas.clientHeight * 0.72 - obstacle.height, obstacle.width, obstacle.height);
      }
      ctx.strokeStyle = 'rgba(255,200,80,0.8)';
      for (const enemy of enemies) {
        const screenX = enemy.worldX - player.cameraX;
        ctx.strokeRect(screenX, enemy.worldY, enemy.width, enemy.height);
      }
      ctx.strokeStyle = 'rgba(80,120,255,0.8)';
      ctx.strokeRect(width * CONFIG.leftDeathX, 0, 2, height);
    }

    // Peaceful sleeping Blu, curled up and breathing, for the sleep screen.
    function drawSleepingBlu(cx, baseY, scale) {
      const B = CONFIG.bluBody, E = CONFIG.bluEar, N = CONFIG.bluNose, SH = CONFIG.bluShade;
      const breathe = Math.sin(state.time * 2) * 1.5;
      ctx.save();
      ctx.translate(cx, baseY);
      ctx.scale(scale, scale);
      px(-42, 6 - breathe, 84, 22 + breathe, B);           // curled body
      px(-8, 6 - breathe, 84, 22 + breathe, B);            // (offset lump for roundness)
      px(56, 14, 12, 12, SH);                              // paw/tail curl
      px(-30, -8, 30, 16, B);                              // head resting
      px(-28, -14, 6, 8, E); px(-16, -14, 6, 8, E);        // ears
      px(-24, -2, 6, 2, N);                                // closed eye (line)
      px(-12, 0, 3, 3, N);                                 // nose
      // Zzz rising
      ctx.fillStyle = '#8a6f4d'; ctx.textAlign = 'left';
      const zf = state.time % 3;
      ctx.font = 'bold 14px monospace'; ctx.fillText('z', 40, -14 - zf * 6);
      ctx.font = 'bold 18px monospace'; ctx.fillText('Z', 52, -24 - zf * 8);
      ctx.restore();
      // Dream bubble with a tiny spinning vinyl (gently bobs)
      const bx = cx + 74 * scale, by = baseY - 40 * scale + Math.sin(state.time * 1.6) * 3;
      ctx.fillStyle = '#faf3e3';
      ctx.beginPath(); ctx.arc(bx, by, 16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx - 14, by + 12, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx - 20, by + 20, 3, 0, Math.PI * 2); ctx.fill();
      px(bx - 7, by - 7, 14, 14, CONFIG.dark);
      px(bx - 2, by - 2, 4, 4, CONFIG.art.vinylLabel);
    }

    function drawSleepScreen() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const g = h * 0.72;
      const over = state.sleepMode === 'gameover';

      // Cozy dim shop scene
      px(0, 0, w, g, '#d6c5a2');
      px(0, g, w, h - g, '#a3855a');
      for (let x = (w * 0.16); x < w; x += w * 0.2) px(x, g, 3, h - g, '#93764c');
      // Dim Filament neon, top-right
      px(w - 180, 24, 150, 44, '#c88a3f'); px(w - 176, 28, 142, 36, '#3a2f24');
      ctx.fillStyle = '#e0894a'; ctx.textAlign = 'center';
      ctx.font = 'bold 13px monospace'; ctx.fillText('FILAMENT', w - 105, 45);
      ctx.font = 'bold 10px monospace'; ctx.fillText('AUDIO', w - 105, 58);

      // Two-tone SHOP CAT logo (shrinks up in game-over state)
      const logoSize = over ? 34 : 52;
      const logoY = over ? h * 0.14 : h * 0.2;
      ctx.textAlign = 'center';
      ctx.font = `bold ${logoSize}px monospace`;
      ctx.fillStyle = CONFIG.bluEar; ctx.fillText('SHOP CAT', w / 2 + 4, logoY + 4);
      ctx.fillStyle = '#5c4a33'; ctx.fillText('SHOP CAT', w / 2, logoY);

      if (over) {
        // Death quip banner + YOUR TAKE
        ctx.fillStyle = CONFIG.rust; ctx.fillRect(w / 2 - 150, h * 0.19, 300, 40);
        ctx.fillStyle = '#f7efe0'; ctx.font = 'bold 24px monospace';
        ctx.fillText(state.quip || player.deathCause, w / 2, h * 0.19 + 28);
        ctx.fillStyle = '#5c4a33'; ctx.font = 'bold 17px monospace';
        ctx.fillText(`YOUR TAKE: ${state.lastTake}m`, w / 2, h * 0.34);
      } else {
        ctx.fillStyle = '#8a6f4d'; ctx.font = '15px monospace';
        ctx.fillText('help blu survive the shop', w / 2, logoY + 30);
      }

      // Sleeping Blu, center
      drawSleepingBlu(w / 2, g - 36, over ? 1.0 : 1.15);

      // BEST TAKES panel (left)
      const bpx = w * 0.06, bpy = h * 0.42;
      px(bpx, bpy, 210, 132, '#f7efe0');
      px(bpx, bpy, 210, 20, CONFIG.bluEar);
      ctx.fillStyle = '#3a2f24'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      ctx.fillText('BEST TAKES', bpx + 105, bpy + 14);
      ctx.textAlign = 'left'; ctx.font = '14px monospace';
      for (let i = 0; i < 3; i += 1) {
        const t = bestTakes[i];
        const rowY = bpy + 46 + i * 26;
        if (i === state.newTakeIndex) { ctx.fillStyle = CONFIG.bluEar; ctx.fillRect(bpx + 6, rowY - 15, 198, 22); }
        ctx.fillStyle = i === state.newTakeIndex ? '#2b2420' : '#5c4a33';
        const ini = t ? t.initials : '---';
        const val = t ? `${t.score}` : '---';
        const mk = i === state.newTakeIndex ? ' ◀' : '';
        ctx.fillText(`${i + 1}. ${ini}  ${val}${mk}`, bpx + 14, rowY);
      }

      // WAX PULLED WORLDWIDE panel (right). Hidden if a configured fetch failed.
      if (!(waxConfigured() && state.waxOnline === false)) {
        const wpx = w * 0.72, wpy = h * 0.5;
        px(wpx, wpy, 210, 54, '#3a2f24');
        ctx.textAlign = 'center';
        ctx.fillStyle = '#c9b393'; ctx.font = '11px monospace';
        ctx.fillText('WAX PULLED WORLDWIDE', wpx + 105, wpy + 20);
        ctx.fillStyle = '#f5b862'; ctx.font = 'bold 19px monospace';
        ctx.fillText(state.waxCount.toLocaleString('en-US'), wpx + 105, wpy + 44);
      }

      // Pulsing prompt (after the dead-zone) + controls legend on the floorboards
      if (state.deadZoneTimer >= CONFIG.deadZone) {
        ctx.fillStyle = `rgba(184,86,62,${0.6 + 0.4 * Math.abs(Math.sin(state.time * 3))})`;
        ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
        ctx.fillText(state.touchDevice ? 'TAP TO WAKE BLU' : 'PRESS ANY KEY TO WAKE BLU', w / 2, g + 34);
      }
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f2e8d5'; ctx.font = '13px monospace';
      if (state.touchDevice) {
        ctx.fillText('TAP jump · SWIPE ←→ dash · SWIPE ↓ slide · HOLD a side to move', w / 2, g + 58);
        if (window.innerHeight > window.innerWidth) {   // gentle rotate nudge in portrait
          ctx.fillStyle = `rgba(245,184,98,${0.55 + 0.45 * Math.abs(Math.sin(state.time * 3))})`;
          ctx.font = 'bold 13px monospace';
          ctx.fillText('↻ rotate to landscape for the full view', w / 2, g + 78);
        }
      } else {
        ctx.fillText('← → move · ↑ jump (×2 double) · ↓ dive/slide · D dash · M mute', w / 2, g + 60);
      }

      drawMuteIcon(w - 40, 30);
    }

    function drawInitials() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.save();
      ctx.fillStyle = 'rgba(19,17,15,0.78)';
      ctx.fillRect(0, 0, width, height);
      ctx.textAlign = 'center';

      ctx.fillStyle = '#f5b862';
      ctx.font = 'bold 26px monospace';
      ctx.fillText('NEW BEST TAKE!', width / 2, height * 0.3);

      ctx.fillStyle = '#fbf6ea';
      ctx.font = '18px monospace';
      ctx.fillText(`${state.pendingScore}`, width / 2, height * 0.3 + 30);

      // Three letter slots with a blinking cursor on the current one
      const slotW = 54;
      const startX = width / 2 - slotW;
      const slotY = height * 0.5;
      const blink = Math.floor(state.time * 2) % 2 === 0;
      for (let i = 0; i < 3; i += 1) {
        const sx = startX + i * slotW;
        ctx.strokeStyle = '#8a6f4d';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 20, slotY - 4, 40, 44);
        const ch = state.initials[i];
        ctx.fillStyle = '#fbf6ea';
        ctx.font = 'bold 34px monospace';
        if (ch) {
          ctx.fillText(ch, sx, slotY + 30);
        } else if (i === state.initialsPos && blink) {
          ctx.fillText('_', sx, slotY + 30);
        }
      }

      ctx.fillStyle = '#c9b79a';
      ctx.font = '14px monospace';
      ctx.fillText('TYPE 3 LETTERS   ENTER = OK   ESC = SKIP', width / 2, height * 0.72);
      ctx.restore();
    }

    // Very light film-grain / tape-warmth overlay.
    function drawTapeWarmth(w, h) {
      ctx.save();
      const grad = ctx.createRadialGradient(w / 2, h / 2, h * 0.3, w / 2, h / 2, h * 0.8);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(40,26,12,0.16)');            // gentle vignette
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(245,220,180,0.03)';               // warm tint
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function draw() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.clearRect(0, 0, width, height);

      if (state.mode === 'sleep') {
        drawSleepScreen();
        drawTapeWarmth(width, height);
        return;
      }

      // Screen shake — offsets the world, not the HUD.
      ctx.save();
      if (state.shakeMag > 0.2) {
        ctx.translate(rnd(-state.shakeMag, state.shakeMag), rnd(-state.shakeMag, state.shakeMag));
      }

      drawBackground();
      drawObstacles();
      drawPickups();
      drawEnemies();
      drawBlu();
      drawParticles();

      ctx.restore();

      // Hit-freeze flash on the killing blow
      if (player.dead && state.deathPhase === 'freeze') {
        ctx.save();
        ctx.fillStyle = `rgba(255,255,255,${0.5 * (1 - state.deathTimer / CONFIG.hitFreezeTime)})`;
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
      }

      // Warm vinyl flash
      if (state.flashTimer > 0) {
        ctx.fillStyle = `rgba(245,184,98,${0.32 * (state.flashTimer / CONFIG.flashTime)})`;
        ctx.fillRect(0, 0, width, height);
      }

      // Danger glow on the left edge (under the HUD)
      if (state.glowAmount > 0) {
        const leftBand = width * 0.18;
        const gradient = ctx.createLinearGradient(0, 0, leftBand, 0);
        gradient.addColorStop(0, 'rgba(245,184,98,0.0)');
        gradient.addColorStop(1, `rgba(245,184,98,${Math.min(0.28, state.glowAmount * 0.28)})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, leftBand, height);
      }

      drawTapeWarmth(width, height);
      drawUI();
      drawDebug();

      // Arcade initials entry overlays the frozen run world
      if (player.dead && state.deathPhase === 'initials') {
        drawInitials();
      }
    }


    function loop(ts) {
      const dt = Math.min(0.032, (ts - state.lastTime) / 1000);
      state.lastTime = ts;
      state.time += dt;

      updateInput(dt);
      updateTouchHolds(dt);
      if (state.mode === 'sleep') {
        updateSleep(dt);
      } else if (player.dead) {
        updateDeath(dt);
      } else {
        updatePlayer(dt);
      }
      updateEffects(dt);
      draw();
      requestAnimationFrame(loop);
    }

    loadBestTakes();
    loadMute();
    fetchWax();          // pull the global count for the sleep screen (no-op until configured)
    resizeCanvas();
    resetRun();
    goToSleep(false);   // boot to the title sleep screen
    requestAnimationFrame(loop);
  </script>
</body>
</html>
