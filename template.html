<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{NAME}} | Builds & Inventions</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Apply saved theme ASAP -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem("theme");
        if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
        else document.documentElement.removeAttribute("data-theme");
      } catch (e) {}
    })();
  </script>
</head>
<body>

  <header class="container">
<a class="brand" href="index.html" aria-label="Home">
  <img class="brand-logo" src="images/logo.png" alt="{{NAME}} logo">
</a>

    <h1>{{NAME}}</h1>
    <p class="subtitle">{{TAGLINE}}</p>

    <div class="quick">
      <a href="#builds">Builds</a>
      <a href="repairs.html">Troubleshooting</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>

    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
      🌙 Dark
    </button>
  </header>

  <main class="container">

    <section id="builds" class="projects">
      <h2>Build Log</h2>
      <p class="section-note">{{BUILD_LOG_NOTE}}</p>

      <!-- Filters -->
      <div class="filter-bar">
        <input id="search" class="search" type="search" placeholder="Search builds..." />
        <div id="tagFilters" class="tag-filters"></div>
      </div>

      <!-- PROJECTS_START -->
      <!-- PROJECTS_END -->
    </section>

    <section id="about" class="about">
      <h2>About</h2>
      <p>{{ABOUT_TEXT}}</p>

      <div class="tags">
        <!-- TAGS_START -->
        <!-- TAGS_END -->
      </div>
    </section>

    <section id="contact" class="contact">
      <h2>Contact</h2>
      <p>Email: <a href="mailto:{{EMAIL}}">{{EMAIL}}</a></p>

      <div class="links">
        <a href="{{INSTAGRAM_URL}}" target="_blank" rel="noopener">Instagram</a>
        <a href="{{YOUTUBE_URL}}" target="_blank" rel="noopener">YouTube</a>
      </div>
    </section>

  </main>

  <footer class="container footer">
    <p>© <span id="year"></span> {{NAME}}</p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <!-- Theme toggle (same behavior on BOTH pages) -->
  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      const key = "theme";

      function setTheme(mode) {
        if (mode === "dark") {
          root.setAttribute("data-theme", "dark");
          if (btn) btn.textContent = "☀️ Light";
        } else {
          root.removeAttribute("data-theme");
          if (btn) btn.textContent = "🌙 Dark";
        }
      }

      let saved = null;
      try { saved = localStorage.getItem(key); } catch (e) {}

      if (saved === "dark" || saved === "light") {
        setTheme(saved);
      } else {
        const prefersDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        setTheme(prefersDark ? "dark" : "light");
      }

      if (!btn) return;

      btn.addEventListener("click", () => {
        const isDark = root.getAttribute("data-theme") === "dark";
        const next = isDark ? "light" : "dark";
        try { localStorage.setItem(key, next); } catch (e) {}
        setTheme(next);
      });
    })();
  </script>

  <script>
    // Expand/collapse photo galleries
    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-gallery-toggle]");
      if (!btn) return;

      const id = btn.getAttribute("data-gallery-toggle");
      const gallery = document.getElementById(id);
      if (!gallery) return;

      const open = gallery.classList.toggle("is-open");
      btn.textContent = open ? "Hide photos" : "More photos";
    });
  </script>

  <script>
    // Search + tag filtering (cards must have data-tags="tag1,tag2")
    (function () {
      const search = document.getElementById("search");
      const tagWrap = document.getElementById("tagFilters");
      const cards = Array.from(document.querySelectorAll(".project-card"));

      if (!search || !tagWrap || cards.length === 0) return;

      const tagSet = new Set();
      for (const c of cards) {
        const tags = (c.dataset.tags || "")
          .split(",")
          .map(t => t.trim())
          .filter(Boolean);
        tags.forEach(t => tagSet.add(t));
      }

      const tags = ["all", ...Array.from(tagSet).sort()];
      let activeTag = "all";

      function renderTags() {
        tagWrap.innerHTML = "";
        for (const t of tags) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "tag-filter" + (t === activeTag ? " is-active" : "");
          btn.textContent = t === "all" ? "All" : t;
          btn.addEventListener("click", () => {
            activeTag = t;
            renderTags();
            apply();
          });
          tagWrap.appendChild(btn);
        }
      }

      function apply() {
        const q = (search.value || "").trim().toLowerCase();

        for (const c of cards) {
          const textMatch = c.textContent.toLowerCase().includes(q);

          const cardTags = (c.dataset.tags || "")
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);

          const tagMatch = activeTag === "all" ? true : cardTags.includes(activeTag);

          c.style.display = (textMatch && tagMatch) ? "" : "none";
        }
      }

      renderTags();
      apply();
      search.addEventListener("input", apply);
    })();
  </script>

</body>
</html>
