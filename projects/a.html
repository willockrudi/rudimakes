  <script>
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("themeToggle");
      function setTheme(mode) {
        if (mode === "light") { root.setAttribute("data-theme", "light"); if (btn) btn.textContent = "🌙 Dark"; }
        else { root.removeAttribute("data-theme"); if (btn) btn.textContent = "☀️ Light"; }
      }
      let saved = null;
      try { saved = localStorage.getItem("theme"); } catch (e) {}
      setTheme(saved === "light" ? "light" : "dark");
      if (!btn) return;
      btn.addEventListener("click", () => {
        const isLight = root.getAttribute("data-theme") === "light";
        const next = isLight ? "dark" : "light";
        try { localStorage.setItem("theme", next); } catch (e) {}
        setTheme(next);
      });
    })();
  </script>
  <script>
    (function () {
      const toggle = document.getElementById("navToggle");
      const menu = document.getElementById("navMenu");
      if (!toggle || !menu) return;
      toggle.addEventListener("click", () => menu.classList.toggle("is-open"));
    })();
  </script>
